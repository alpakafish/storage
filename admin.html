<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд — Моя кладовка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <header class="admin-header">
      <div>
        <span style="font-size:1rem;font-weight:600">📦 Кладовка</span>
        <span class="badge">ADMIN</span>
      </div>
      <a href="index.html" class="admin-link" target="_blank">← Открыть сайт</a>
    </header>

    <div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="tab-photos">Фотографии</button>
        <button class="tab-btn" data-tab="tab-items">Содержимое</button>
        <button class="tab-btn" data-tab="tab-dots">Точки</button>
        <button class="tab-btn" data-tab="tab-settings">Настройки</button>
      </nav>

      <div class="tab-content active" id="tab-photos">
        <div style="display:flex;align-items:center;gap:10px;color:var(--text-muted);font-size:0.88rem">
          <span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Загрузка данных...
        </div>
      </div>
      <div class="tab-content" id="tab-items"></div>
      <div class="tab-content" id="tab-dots"></div>
      <div class="tab-content" id="tab-settings">
        <div class="section" style="max-width:500px">
          <div class="section-title">Данные</div>
          <div class="card">
            <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:16px">
              Данные хранятся в Firebase Firestore и доступны всем в реальном времени.
            </p>
            <div class="btn-row" style="border:none;padding:0;margin-top:0">
              <button class="btn btn-secondary" onclick="AdminApp.exportData()">Экспорт JSON</button>
              <button class="btn btn-secondary" onclick="AdminApp.importData()">Импорт JSON</button>
            </div>
          </div>
          <div class="section-title" style="margin-top:24px">Опасная зона</div>
          <div class="danger-zone">
            <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:14px">
              Сброс удалит все изменения и вернёт данные к первоначальным.
            </p>
            <button class="btn btn-danger" onclick="AdminApp.resetAll()">Сбросить все данные</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    AdminApp.exportData = async function () {
      const d = await window.StorageData.loadData();
      const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'storage-map-data.json';
      a.click();
    };

    AdminApp.importData = function () {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = function () {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function (e) {
          try {
            const parsed = JSON.parse(e.target.result);
            await window.StorageData.saveData(parsed);
            location.reload();
          } catch { alert('Неверный формат файла'); }
        };
        reader.readAsText(file);
      };
      input.click();
    };
  </script>
</body>
</html>
